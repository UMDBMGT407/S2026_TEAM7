<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/staff.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { text-decoration: none; }
  </style>
  <title>My Shifts</title>
</head>
<body>
<div class="staff">

  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #204631;">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="{{ url_for('staff_scheduling_staff') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="46px">
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('staff_scheduling_staff') }}">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('event_details_staff') }}">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('staff_shift') }}">Shift</a>
          </li>
        </ul>

        <ul class="navbar-nav auth-nav">
          <li class="nav-item account-actions">
            <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Sign Out</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-title">My Availability</div>
    <div class="page-subtitle">Click time blocks to mark when you're available. Green = available. Dark = scheduled shift.</div>

    <!-- Availability Card -->
    <div class="card-panel">
      <h2>Weekly Availability</h2>

      <div class="week-nav">
        <button onclick="shiftWeek(-1)">&#8592;</button>
        <span id="week-label"></span>
        <button onclick="shiftWeek(1)">&#8594;</button>
      </div>

      <div class="avail-grid" id="avail-grid"></div>

      <div class="legend">
        <div class="legend-item"><div class="legend-swatch sw-empty"></div> Not available</div>
        <div class="legend-item"><div class="legend-swatch sw-avail"></div> Available</div>
        <div class="legend-item"><div class="legend-swatch sw-shift"></div> Scheduled shift</div>
      </div>

      <div class="action-row">
        <button class="btn-main btn-save" onclick="saveAvailability()">Save Availability</button>
        <button class="btn-main btn-drop" onclick="openDropModal()">Drop a Shift</button>
        <button class="btn-main btn-request" onclick="openRequestModal()">Request Change</button>
      </div>
    </div>

    <!-- Upcoming Shifts Card -->
    <div class="card-panel">
      <h2>My Upcoming Shifts</h2>
      <table class="shifts-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Role</th>
            <th>Event</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="shifts-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Drop Shift Modal -->
<div class="modal fade" id="dropModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Drop a Shift</span>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Select Shift to Drop</label>
        <select class="form-select" id="drop-shift-select"></select>
        <label>Reason for Dropping</label>
        <textarea class="form-control" id="drop-reason" rows="3" placeholder="Brief reason (optional)..."></textarea>        
      </div>
      <div class="modal-footer border-0">
        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-green" onclick="submitDrop()">Submit Drop Request</button>
      </div>
    </div>
  </div>
</div>

<!-- Request Change Modal -->
<div class="modal fade" id="requestModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Request a Change</span>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Type of Request</label>
        <select class="form-select" id="request-type">
          <option value="">Select...</option>
          <option value="swap">Shift Swap</option>
          <option value="time">Time Change</option>
          <option value="role">Role Change</option>
          <option value="other">Other</option>
        </select>
        <label>Shift Affected</label>
        <select class="form-select" id="request-shift-select"></select>
        <label>Details / Notes</label>
        <textarea class="form-control" id="request-notes" rows="4" placeholder="Describe your request..."></textarea>
      </div>
      <div class="modal-footer border-0">
        <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-green" onclick="submitRequest()">Send Request</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script>
  const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const HOURS = Array.from({length:12}, (_, i) => i + 10); // 10am–9pm

  // Scheduled shifts passed from Flask via Jinja2
  const scheduledShifts = {{ scheduled_shifts | tojson }};


  function offsetDate(n) {
    const d = new Date(); d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  function getWeekDates(offset) {
    const today = new Date();
    const day = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day===0 ? 6 : day-1) + offset*7);
    return Array.from({length:7}, (_, i) => {
      const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
    });
  }

  function fmtDate(d) { return d.toISOString().split('T')[0]; }

  function fmtHour(h) {
    const ampm = h < 12 ? 'am' : 'pm';
    const disp = h > 12 ? h - 12 : h;
    return `${disp}:00${ampm}`;
  }

  const savedAvailability = {{ saved_availability | tojson }};
  let availability = {};
  savedAvailability.forEach(slot => {
      const dates = getWeekDates(0);
      dates.forEach(d => {
          if (DAY_NAMES[d.getDay()].toLowerCase() === slot.day_of_week) {
              const h = parseInt(slot.start_time.split(':')[0]);
              const key = `${fmtDate(d)}_${h}`;
              availability[key] = true;
          }
      });
  });
  let weekOffset = 0;

  function renderGrid() {
    const dates = getWeekDates(weekOffset);
    const todayStr = fmtDate(new Date());

    const first = dates[0], last = dates[6];
    document.getElementById('week-label').textContent =
      `${first.getDate()} ${MONTH_NAMES[first.getMonth()]} – ${last.getDate()} ${MONTH_NAMES[last.getMonth()]} ${last.getFullYear()}`;

    const grid = document.getElementById('avail-grid');
    let html = '';

    html += `<div class="cell hdr" style="background:#204631;color:#fff;font-family:'Passion One',sans-serif;font-size:15px;padding:10px 4px;text-align:center;">Time</div>`;
    dates.forEach(d => {
      const ds = fmtDate(d);
      const isToday = ds === todayStr;
      html += `<div class="cell hdr${isToday ? ' today-hdr' : ''}" style="text-align:center;">
        ${DAY_NAMES[d.getDay()]}<br><span style="font-size:22px">${d.getDate()}</span>
      </div>`;
    });

    HOURS.forEach(h => {
      html += `<div class="cell time-lbl">${fmtHour(h)}</div>`;
      dates.forEach(d => {
        const ds = fmtDate(d);
        const key = `${ds}_${h}`;
        const shift = scheduledShifts.find(s => s.date === ds && h >= s.startH && h < s.endH);
        if (shift) {
          html += `<div class="slot has-shift" data-shift="${shift.role}"></div>`;
        } else {
          const isAvail = !!availability[key];
          html += `<div class="slot${isAvail ? ' available' : ''}" onclick="toggleSlot('${key}', this)"></div>`;
        }
      });
    });

    grid.innerHTML = html;
  }

  function shiftWeek(dir) { weekOffset += dir; renderGrid(); }

  function toggleSlot(key, el) {
    availability[key] = !availability[key];
    el.classList.toggle('available', availability[key]);
  }

  function saveAvailability() {
    const slots = [];
    const dates = getWeekDates(weekOffset);

    HOURS.forEach(h => {
        dates.forEach(d => {
            const ds = fmtDate(d);
            const key = `${ds}_${h}`;
            if (availability[key]) {
                slots.push({
                    day_of_week: DAY_NAMES[d.getDay()].toLowerCase(),
                    start_time: `${h}:00:00`,
                    end_time: `${h + 1}:00:00`
                });
            }
        });
    });

    fetch('/save-availability', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(slots)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) showToast('Availability saved!', '#204631');
        else showToast('Error saving. Try again.', '#c0392b');
    });
}

  function renderShifts() {
    const tbody = document.getElementById('shifts-tbody');
    const opts1 = document.getElementById('drop-shift-select');
    const opts2 = document.getElementById('request-shift-select');

    tbody.innerHTML = scheduledShifts.map(s => {
      const d = new Date(s.date + 'T00:00:00');
      const dateStr = `${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
      return `<tr>
        <td>${dateStr}</td>
        <td>${fmtHour(s.startH)} – ${fmtHour(s.endH)}</td>
        <td><span class="badge-shift">${s.role}</span></td>
        <td>${s.event}</td>
        <td>
          <button class="icon-btn red" onclick="prefillDrop(${s.id})">Drop</button>
          <button class="icon-btn blue" onclick="prefillRequest(${s.id})">Change</button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">No upcoming shifts.</td></tr>`;

    const shiftOptions = ['<option value="">Select a shift...</option>',
      ...scheduledShifts.map(s => {
        const d = new Date(s.date + 'T00:00:00');
        return `<option value="${s.id}">${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTH_NAMES[d.getMonth()]} | ${fmtHour(s.startH)}–${fmtHour(s.endH)} | ${s.event}</option>`;
      })
    ].join('');
    opts1.innerHTML = shiftOptions;
    opts2.innerHTML = shiftOptions;
  }

  let dropModal, requestModal;

  function openDropModal() {
    document.getElementById('drop-reason').value = '';
    document.getElementById('drop-email').value = '';
    document.getElementById('drop-shift-select').value = '';
    dropModal.show();
  }

  function prefillDrop(id) {
    document.getElementById('drop-shift-select').value = id;
    dropModal.show();
  }

  function submitDrop() {
    const shift = document.getElementById('drop-shift-select').value;
    const reason = document.getElementById('drop-reason').value.trim();
    if (!shift) { alert('Please select a shift to drop.'); return; }

    fetch('/submit-shift-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            shift_id: shift,
            request_type: 'drop',
            notes: reason
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            dropModal.hide();
            showToast('Drop request submitted!', '#c0392b');
        } else {
            showToast('Error submitting. Try again.', '#c0392b');
        }
    });
  }

  function openRequestModal() {
    document.getElementById('request-type').value = '';
    document.getElementById('request-notes').value = '';
    document.getElementById('request-email').value = '';
    document.getElementById('request-shift-select').value = '';
    requestModal.show();
  }

  function prefillRequest(id) {
    document.getElementById('request-shift-select').value = id;
    requestModal.show();
  }

  function submitRequest() {
    const type = document.getElementById('request-type').value;
    const shift = document.getElementById('request-shift-select').value;
    const notes = document.getElementById('request-notes').value.trim();
    if (!type) { alert('Please select a request type.'); return; }
    if (!shift) { alert('Please select the affected shift.'); return; }

    fetch('/submit-shift-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            shift_id: shift,
            request_type: type,
            notes: notes
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            requestModal.hide();
            showToast('Request submitted!', '#204631');
        } else {
            showToast('Error submitting. Try again.', '#c0392b');
        }
    });
  }

  function showToast(msg, bg) {
    const el = document.getElementById('liveToast');
    el.style.background = bg;
    document.getElementById('toast-msg').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, {delay:3000}).show();
  }

  document.addEventListener('DOMContentLoaded', () => {
    dropModal    = new bootstrap.Modal(document.getElementById('dropModal'));
    requestModal = new bootstrap.Modal(document.getElementById('requestModal'));
    renderGrid();
    renderShifts();
  });
</script>
</body>
</html>
