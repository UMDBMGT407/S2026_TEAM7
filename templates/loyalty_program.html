<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/customer_consolidated.css') }}">

  <title>Loyalty Program Admin</title>

  <style>
    body {
      background-color: #36845a;
      font-family: 'Roboto', sans-serif;
    }

    .container-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      margin: 120px auto;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
    }

    .title {
      font-family: 'Passion One', sans-serif;
      font-size: 40px;
      text-align: center;
      margin-bottom: 20px;
    }

    .tier-text {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }

    .gold { color: gold; }
    .silver { color: gray; }
    .green { color: green; }

    .btn-custom {
      background-color: #204631;
      color: white;
    }

    .btn-delete {
      background-color: red;
      color: white;
    }
  </style>
</head>

<body>

<div class="container-box">

  <div class="title">LOYALTY PROGRAM ADMIN</div>

  <!-- SEARCH -->
  <form method="POST" action="{{ url_for('loyalty_program_search') }}">
    <div class="mb-3">
      <label>Enter Member ID</label>
      <input type="number" name="member_id" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-custom w-100">Search</button>
  </form>

  <hr>

  {% if member %}

  <!-- TIER DISPLAY -->
  <div class="tier-text
      {% if status_tier == 'Gold' %}gold
      {% elif status_tier == 'Silver' %}silver
      {% else %}green
      {% endif %}
  ">
    {{ status_tier }} Member
  </div>

  <!-- MEMBER INFO -->
  <form method="POST" action="{{ url_for('loyalty_program_update') }}">

    <input type="hidden" name="member_id" value="{{ member.member_id }}">

    <div class="mb-2">
      <label>Name</label>
      <input type="text" name="customer_name" class="form-control"
             value="{{ member.customer_name }}">
    </div>

    <div class="mb-2">
      <label>Phone</label>
      <input type="text" name="phone" class="form-control"
             value="{{ member.phone }}">
    </div>

    <div class="mb-2">
      <label>Email</label>
      <input type="text" name="email" class="form-control"
             value="{{ member.email }}">
    </div>

    <div class="mb-2">
      <label>Date of Birth</label>
      <input type="text" class="form-control"
             value="{{ member.date_of_birth }}" readonly>
    </div>

    <div class="mb-2">
      <label>Date Joined</label>
      <input type="text" class="form-control"
             value="{{ member.join_date }}" readonly>
    </div>

    <div class="mb-3">
      <label>Points</label>
      <input type="text" class="form-control"
             value="{{ member.points }}" readonly>
    </div>

    <button type="submit" class="btn btn-custom w-100 mb-2">
      Update Member
    </button>
  </form>

  <!-- DELETE BUTTON -->
  <form method="POST" action="{{ url_for('loyalty_program_delete') }}">
    <input type="hidden" name="member_id" value="{{ member.member_id }}">
    <button type="submit" class="btn btn-delete w-100">
      Delete Account
    </button>
  </form>

  {% endif %}

</div>

</body>
</html>
