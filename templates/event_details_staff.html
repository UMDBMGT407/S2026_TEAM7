<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/staff.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { text-decoration: none; }
  </style>
  <title>Event Details</title>
</head>
<body>
  <div class="staff">
    <nav class="navbar navbar-expand-lg gt-nav">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('staff_scheduling_staff') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="nav-logo"/>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto nav-links-row">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('staff_scheduling_staff') }}">Schedule</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('event_details_staff') }}">Events</a>
            </li>
            <li class="nav-item">
            <a class="nav-link" href="{{ url_for('staff_shift') }}">Shift</a>
          </li>
          </ul>

          <ul class="navbar-nav auth-nav">
            <li class="nav-item account-actions">
              {% if user_role == "staff" %}
                <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('staff_scheduling') }}">Staff</a>
                <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

              {% elif user_role == "admin" %}
                <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('admin_page') }}">Admin</a>
                <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

              {% else %}
                <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('login') }}">Sign In</a>
              {% endif %}
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="page-content">
      <div class="left-panel">
        <div class="upcoming-events-background">
          <div class="upcoming-events-header">Upcoming Events:</div>
          <div id="eventsList"></div>
        </div>
      </div>
      <div class="right-panel">
        <div class="event-details-background">
          <div id="eventDetail"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Events data passed from Flask via Jinja2
    const events = {{ events | tojson }};

    let selectedEvent = events[0];

    function selectEvent(id) {
      selectedEvent = events.find(e => e.id === id);
      renderEventsList();
      renderEventDetail();
    }

    function renderEventsList() {
      const list = document.getElementById('eventsList');
      list.innerHTML = events.map(e => `
        <div class="event-item ${selectedEvent.id === e.id ? 'selected' : ''}"
            onclick="selectEvent(${e.id})">
          <div class="ellipse"></div>
          <div>
            <div class="event-item-type">${e.type}</div>
            <div class="event-item-date">${e.date}</div>
            <div class="event-item-time">${e.time}</div>
          </div>
        </div>
      `).join('');
    }

    function renderEventDetail() {
      const detail = document.getElementById('eventDetail');
      detail.innerHTML = `
        <div class="event-details-frame">
          <div class="event-label">Event:</div>
          <div class="event-value">${selectedEvent.type}</div>
          <div class="event-label">Name:</div>
          <div class="event-value">${selectedEvent.name}</div>
          <div class="event-label">Email:</div>
          <div class="event-value">${selectedEvent.email}</div>
          <div class="event-label">Guests:</div>
          <div class="event-value">${selectedEvent.guests}</div>
          <div class="event-label">Day:</div>
          <div class="event-value">${selectedEvent.date}</div>
          <div class="event-label">Time:</div>
          <div class="event-value">${selectedEvent.time}</div>
        </div>
        <div class="event-desc">
          <div class="event-description">Event Description:</div>
          <div class="event-desc-text">${selectedEvent.description}</div>
        </div>
        <div class="available-staff-section">
          <div class="event-description">Available Staff:</div>
          ${selectedEvent.staff.map(s => `
            <div class="staff-item">
              <div class="ellipse"></div>
              <span class="staff-name">${s}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    renderEventsList();
    renderEventDetail();
  </script>
</body>
</html>
