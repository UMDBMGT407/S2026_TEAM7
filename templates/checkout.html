<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/customer_consolidated.css') }}">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { text-decoration: none; }
  </style>

  <title>Checkout</title>
</head>
<body>
  <div class="checkout-page">
    <nav class="navbar navbar-expand-lg gt-nav">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="nav-logo"/>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto nav-links-row">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('online_ordering') }}">Order Online</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('event_inquiry') }}">Event Inquiry</a>
            </li>
  
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('become_a_member') }}">Become a Member</a>
            </li>
          </ul>

          <ul class="navbar-nav auth-nav">
            <li class="nav-item account-actions">
              {% if user_role == "customer" %}
                <a class="sign-in-btn account-icon-btn" id="navAccountButton" href="{{ url_for('home') }}">
                  <img src="{{ url_for('static', filename='images/profile_head.png') }}" alt="Profile" class="account-icon-image">
                </a>
                <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

              {% elif user_role == "staff" %}
                <a class="sign-in-btn active-signin staff-btn" id="navAccountButton" href="{{ url_for('staff_scheduling_staff') }}">Staff</a>
                <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

              {% elif user_role == "admin" %}
                <a class="sign-in-btn active-signin admin-btn" id="navAccountButton" href="{{ url_for('dashboard') }}">Admin</a>
                <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

              {% else %}
                <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('login') }}">Sign In</a>
              {% endif %}
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="checkout-page">
      <div class="checkout-container">
        <h1 class="checkout-title">CHECKOUT</h1>

        <div class="checkout-layout">
          <section class="checkout-form-section">
            <form class="checkout-form">
              <div class="form-group full-width">
                <label class="checkout-label" for="email">EMAIL</label>
                <input class="checkout-input" id="email" type="email" name="email" />
              </div>

              <div class="form-row two-col">
                <div class="form-group">
                  <label class="checkout-label" for="firstName">FIRST NAME</label>
                  <input class="checkout-input" id="firstName" type="text" name="firstName" />
                </div>

                <div class="form-group">
                  <label class="checkout-label" for="lastName">LAST NAME</label>
                  <input class="checkout-input" id="lastName" type="text" name="lastName" />
                </div>
              </div>

              <div class="form-row card-row">
                <div class="form-group card-number-group">
                  <label class="checkout-label" for="cardNumber">CREDIT CARD NUMBER</label>
                  <input class="checkout-input" id="cardNumber" type="text" name="cardNumber" />
                </div>

                <div class="form-group exp-group">
                  <label class="checkout-label" for="exp">EXP</label>
                  <input
                    class="checkout-input"
                    id="exp"
                    type="text"
                    name="exp"
                    placeholder="MM/YY"
                    maxlength="5"
                  />
                </div>

                <div class="form-group cvc-group">
                  <label class="checkout-label" for="cvc">CVC</label>
                  <input class="checkout-input" id="cvc" type="text" name="cvc" />
                </div>
              </div>

              <div class="form-row address-row">
                <div class="form-group address-group">
                  <label class="checkout-label" for="address">ADDRESS</label>
                  <input class="checkout-input" id="address" type="text" name="address" />
                </div>

                <div class="form-group state-group">
                  <label class="checkout-label" for="state">STATE</label>
                  <input class="checkout-input" id="state" type="text" name="state" />
                </div>

                <div class="form-group zip-group">
                  <label class="checkout-label" for="zipCode">ZIP CODE</label>
                  <input class="checkout-input" id="zipCode" type="text" name="zipCode" />
                </div>
              </div>

              <div class="pay-button-wrap">
                <a href="{{ url_for('cart') }}" class="back-to-cart-btn">Go Back to Cart</a>
                <button class="finish-pay-btn" type="button">Finish and Pay</button>
              </div>
            </form>
          </section>

          <aside class="checkout-summary">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="checkoutSubtotal">$0.00</span>
            </div>

            <div class="summary-row">
              <span>Taxes and Fees</span>
              <span id="checkoutTax">$0.00</span>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-row total-row">
              <span>TOTAL</span>
              <span id="checkoutTotal">$0.00</span>
            </div>
          </aside>
        </div>
      </div>
    </main>
  </div>

  <script>
    const subtotalEl = document.getElementById("checkoutSubtotal");
    const taxEl = document.getElementById("checkoutTax");
    const totalEl = document.getElementById("checkoutTotal");

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    const subtotal = cart.reduce((sum, item) => {
      return sum + (item.price * item.quantity);
    }, 0);

    const tax = subtotal * 0.06;


    function renderTotals() {
      subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
      taxEl.textContent = `$${tax.toFixed(2)}`;
    
      const total = subtotal + tax;
      totalEl.textContent = `$${total.toFixed(2)}`;
    }

    renderTotals();
  </script>

  <script>
  const finishPayBtn = document.querySelector(".finish-pay-btn");

  const emailInput = document.getElementById("email");
  const firstNameInput = document.getElementById("firstName");
  const lastNameInput = document.getElementById("lastName");
  const cardNumberInput = document.getElementById("cardNumber");
  const expInput = document.getElementById("exp");
  const cvcInput = document.getElementById("cvc");
  const addressInput = document.getElementById("address");
  const stateInput = document.getElementById("state");
  const zipCodeInput = document.getElementById("zipCode");

  expInput.addEventListener("input", function () {
    let value = this.value.replace(/\D/g, "");

    if (value.length > 4) {
      value = value.slice(0, 4);
    }

    if (value.length >= 3) {
      value = value.slice(0, 2) + "/" + value.slice(2);
    }

    this.value = value;
  });

  function clearCheckoutForm() {
    emailInput.value = "";
    firstNameInput.value = "";
    lastNameInput.value = "";
    cardNumberInput.value = "";
    expInput.value = "";
    cvcInput.value = "";
    addressInput.value = "";
    stateInput.value = "";
    zipCodeInput.value = "";
  }

  finishPayBtn.addEventListener("click", async function () {
    if (
      !emailInput.value.trim() ||
      !firstNameInput.value.trim() ||
      !lastNameInput.value.trim() ||
      !cardNumberInput.value.trim() ||
      !expInput.value.trim() ||
      !cvcInput.value.trim() ||
      !addressInput.value.trim() ||
      !stateInput.value.trim() ||
      !zipCodeInput.value.trim()
    ) {
      alert("Please fill out all checkout fields.");
      return;
    }

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
      alert("Your cart is empty.");
      return;
    }

    try {
      const response = await fetch("/submit-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          cart: cart,
          payment_method: "Credit Card"
        })
      });

      const result = await response.json();

      if (!response.ok || !result.success) {
        alert(result.message || "There was a problem placing your order.");
        return;
      }

      localStorage.removeItem("cart");
      clearCheckoutForm();
      alert(`Order placed successfully! Order #${result.order_id}`);
      window.location.href = "/";
    } catch (error) {
      console.error(error);
      alert("There was a problem connecting to the server.");
    }
  });
</script>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
