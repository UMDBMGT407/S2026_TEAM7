<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/staff.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { text-decoration: none; }
  </style>
  <title>Staff Scheduling</title>
</head>
<body>
<div class="staff">
  <nav class="navbar navbar-expand-lg gt-nav">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('staff_scheduling') }}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="nav-logo"/>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto nav-links-row">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('staff_scheduling') }}">Schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('event_details') }}">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('staff_shift') }}">Shift</a>
          </li>
        </ul>

        <ul class="navbar-nav auth-nav">
          <li class="nav-item account-actions">
            {% if user_role == "staff" %}
              <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('staff_scheduling') }}">Staff</a>
              <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

            {% elif user_role == "admin" %}
              <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('admin_page') }}">Admin</a>
              <a class="sign-out-btn" href="{{ url_for('logout') }}">Sign Out</a>

            {% else %}
              <a class="sign-in-btn active-signin" id="navAccountButton" href="{{ url_for('login') }}">Sign In</a>
            {% endif %}
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-layout">
    <div class="sidebar">
      <p class="sidebar-heading">View</p>
      <button class="day_button active" onclick="setView('day')">Day</button>
      <button class="day3_button" onclick="setView('3day')">3 Day</button>
      <button class="week_button" onclick="setView('week')">Week</button>
      <p class="sidebar-heading">Staff</p>
      <div class="staff-dropdown-wrapper">
        <!-- Staff list passed from Flask via Jinja2 -->
        <select class="staff-dropdown" onchange="filterByStaff(this.value)">
          <option value="all">All Staff</option>
          {% for member in staff_members %}
          <option value="{{ member }}">{{ member }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="calendar-area">
      <div class="calendar-background2">
        <div class="calendar-nav">
          <button onclick="navigate(-1)">&#8592;</button>
          <span id="nav-label">Today</span>
          <button onclick="navigate(1)">&#8594;</button>
          <div style="margin-left: auto;">
            <button class="today-btn" onclick="goToToday()">Today</button>
          </div>
        </div>
        <div class="dates" id="dateHeader"></div>
        <div class="back-design" id="calendarGrid"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const HOURS = Array.from({ length: 24 }, (_, i) => i);
  const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let currentView = 'day';
  let offset = 0;
  let selectedStaff = 'all';

  // Schedule events passed from Flask via Jinja2
  const events = {{ schedule_events | tojson }};

  function filterByStaff(value) {
    selectedStaff = value;
    renderCalendar(currentView);
  }

  function getDateStr(offsetDays) {
    const d = new Date();
    d.setDate(d.getDate() + offsetDays);
    return d.toISOString().split('T')[0];
  }

  function formatHour(h) {
    const hr  = Math.floor(h);
    const min = Math.round((h - hr) * 60);
    if (hr === 0)  return `12:${min.toString().padStart(2,'0')}am`;
    if (hr === 12) return `12:${min.toString().padStart(2,'0')}pm`;
    const ampm = hr < 12 ? 'am' : 'pm';
    const disp = hr > 12 ? hr - 12 : hr;
    return `${disp}:${min.toString().padStart(2,'0')}${ampm}`;
  }

  function getDatesForView(view) {
    const base = new Date();
    if (view === 'day') {
      base.setDate(base.getDate() + offset);
      return [new Date(base)];
    }
    if (view === '3day') {
      base.setDate(base.getDate() + offset);
      return [0, 1, 2].map(i => {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        return d;
      });
    }
    const day = base.getDay();
    const monday = new Date(base);
    monday.setDate(base.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  function updateNavLabel(dates) {
    const first = dates[0];
    const last  = dates[dates.length - 1];
    if (dates.length === 1) {
      document.getElementById('nav-label').textContent =
        `${DAY_NAMES[first.getDay()]}, ${first.getDate()} ${MONTH_NAMES[first.getMonth()]}`;
    } else {
      document.getElementById('nav-label').textContent =
        `${first.getDate()} ${MONTH_NAMES[first.getMonth()]} – ${last.getDate()} ${MONTH_NAMES[last.getMonth()]}`;
    }
  }

  function navigate(direction) {
    offset += direction;
    renderCalendar(currentView);
  }

  function setView(view) {
    currentView = view;
    offset = 0;
    document.querySelectorAll('.day_button, .week_button, .day3_button').forEach(b => b.classList.remove('active'));
    if (view === 'day')  document.querySelector('.day_button').classList.add('active');
    if (view === 'week') document.querySelector('.week_button').classList.add('active');
    if (view === '3day') document.querySelector('.day3_button').classList.add('active');
    renderCalendar(view);
  }

  function goToToday() {
    offset = 0;
    renderCalendar(currentView);
  }

  function renderCalendar(view) {
    const dates    = getDatesForView(view);
    const todayStr = new Date().toISOString().split('T')[0];

    updateNavLabel(dates);

    document.getElementById('dateHeader').innerHTML = dates.map(d => {
      const ds      = d.toISOString().split('T')[0];
      const isToday = ds === todayStr;
      return `<div class="date-label${isToday ? ' today' : ''}">
        <span class="date-day-name">${DAY_NAMES[d.getDay()]},</span>
        <span class="date-number">${d.getDate()}</span>
        <span class="date-month">${MONTH_NAMES[d.getMonth()]}</span>
      </div>`;
    }).join('');

    const timeCol = `<div class="time-column">
      ${HOURS.map(h => {
        const label = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h - 12}pm`;
        return `<div class="time-label">${label}</div>`;
      }).join('')}
    </div>`;

    const dayCols = `<div class="days-wrapper">
      ${dates.map(d => {
        const ds        = d.toISOString().split('T')[0];
        const dayEvents = events.filter(e => e.date === ds &&
          (selectedStaff === 'all' || e.title === selectedStaff));
        const cells     = HOURS.map(() => `<div class="day-cell"></div>`).join('');

        const eventDivs = dayEvents.map(e => {
          const top    = e.start * 62;
          const height = (e.end - e.start) * 62;
          return `<div class="cal-event" style="top:${top}px;height:${height}px;background:${e.color}">
            <div class="ev-title">${e.role}</div>
            <div class="ev-time">${formatHour(e.start)} – ${formatHour(e.end)}</div>
          </div>`;
        }).join('');

        let timeLine = '';
        if (ds === todayStr) {
          const now     = new Date();
          const nowHour = now.getHours() + now.getMinutes() / 60;
          timeLine = `<div class="current-time-line" style="top:${nowHour * 62}px"></div>`;
        }

        return `<div class="day-col">${cells}${eventDivs}${timeLine}</div>`;
      }).join('')}
    </div>`;

    document.getElementById('calendarGrid').innerHTML = timeCol + dayCols;
  }

  renderCalendar('day');
</script>
</body>
</html>
