<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='vars.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    a, button, input, select, h1, h2, h3, h4, h5, * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    menu, ol, ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }
  </style>
  <title>Event Details</title>
</head>
<body>
  <div class="event-details">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #204631;">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="{{ url_for('admin_page') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="46px">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menu</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('menu') }}">Menu</a></li>
                <li><a class="dropdown-item" href="{{ url_for('menu_adjustments') }}">Menu Adjustments</a></li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Orders</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('orders_and_sales') }}">Orders & Sales</a></li>
                <li><a class="dropdown-item" href="{{ url_for('inventory') }}">Inventory</a></li>
                <li><a class="dropdown-item" href="{{ url_for('inventory_adjustments') }}">Inventory Adjustments</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('events') }}">Events</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('loyalty_program') }}">Loyalty Program</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Promos</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('edit_promos') }}">Edit Promos</a></li>
                <li><a class="dropdown-item" href="{{ url_for('view_promos') }}">View Promos</a></li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Staff</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('staff_scheduling_admin') }}">Staff Schedule</a></li>
                <li><a class="dropdown-item" href="{{ url_for('shift_management') }}">Shift Management</a></li>
              </ul>
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Sign Out</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="page-content">
      <div class="left-panel">
        <div class="upcoming-events-background">
          <div class="upcoming-events-header">Upcoming Events:</div>
          <div id="eventsList"></div>
        </div>
      </div>
      <div class="right-panel">
        <div class="event-details-background">
          <div id="eventDetail"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Events data passed from Flask via Jinja2
    const events = {{ events | tojson }};

    let selectedEvent = events[0];

    function selectEvent(id) {
      selectedEvent = events.find(e => e.id === id);
      renderEventsList();
      renderEventDetail();
    }

    function renderEventsList() {
      const list = document.getElementById('eventsList');
      list.innerHTML = events.map(e => `
        <div class="event-item ${selectedEvent.id === e.id ? 'selected' : ''}"
            onclick="selectEvent(${e.id})">
          <div class="ellipse"></div>
          <div>
            <div class="event-item-type">${e.type}</div>
            <div class="event-item-date">${e.date}</div>
            <div class="event-item-time">${e.time}</div>
          </div>
        </div>
      `).join('');
    }

    function renderEventDetail() {
      const detail = document.getElementById('eventDetail');
      detail.innerHTML = `
        <div class="event-details-frame">
          <div class="event-label">Event:</div>
          <div class="event-value">${selectedEvent.type}</div>
          <div class="event-label">Name:</div>
          <div class="event-value">${selectedEvent.name}</div>
          <div class="event-label">Email:</div>
          <div class="event-value">${selectedEvent.email}</div>
          <div class="event-label">Guests:</div>
          <div class="event-value">${selectedEvent.guests}</div>
          <div class="event-label">Day:</div>
          <div class="event-value">${selectedEvent.date}</div>
          <div class="event-label">Time:</div>
          <div class="event-value">${selectedEvent.time}</div>
        </div>
        <div class="event-desc">
          <div class="event-description">Event Description:</div>
          <div class="event-desc-text">${selectedEvent.description}</div>
        </div>
        <div class="available-staff-section">
          <div class="event-description">Available Staff:</div>
          ${selectedEvent.staff.map(s => `
            <div class="staff-item">
              <div class="ellipse"></div>
              <span class="staff-name">${s}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    renderEventsList();
    renderEventDetail();
  </script>
</body>
</html>
