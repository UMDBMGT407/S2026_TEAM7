<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='vars.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    a, button, input, select, h1, h2, h3, h4, h5, * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    menu, ol, ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }
  </style>
  <title>Event Details</title>
</head>
<body>
  <div class="event-details">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #204631;">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="46px">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menu</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('menu') }}">Menu</a></li>
                <li><a class="dropdown-item" href="{{ url_for('menu_adjustments') }}">Menu Adjustments</a></li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Orders</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('orders_and_sales') }}">Orders & Sales</a></li>
                <li><a class="dropdown-item" href="{{ url_for('inventory') }}">Inventory</a></li>
                <li><a class="dropdown-item" href="{{ url_for('inventory_adjustments') }}">Inventory Adjustments</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('events') }}">Events</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('loyalty_program') }}">Loyalty Program</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Promos</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('edit_promos') }}">Edit Promos</a></li>
                <li><a class="dropdown-item" href="{{ url_for('view_promos') }}">View Promos</a></li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Staff</a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{{ url_for('staff_scheduling_admin') }}">Staff Schedule</a></li>
                <li><a class="dropdown-item" href="{{ url_for('shift_management') }}">Shift Management</a></li>
              </ul>
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Sign Out</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div style="background: #36845a; min-height: 100vh; padding-top: 80px;">
    <div class="events-body">
    <div class="page-heading">Upcoming Events</div>
    <div class="events-summary-row" id="eventSummaryRow"></div>
    <div id="eventDetailSection"></div>
    </div>
    </div>
</div>

  <script>
  const events = {{ events | tojson }};
  let selectedId = events.length ? events[0].id : null;
 
  function selectEvent(id) {
    selectedId = id;
    renderSummaryRow();
    renderDetail();
  }
 
  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }
 
  function renderSummaryRow() {
    const row = document.getElementById('eventSummaryRow');
    if (!events.length) {
      row.innerHTML = '<p style="color:#fff;font-family:Roboto,sans-serif;">No upcoming events.</p>';
      return;
    }
    row.innerHTML = events.map(e => `
      <div class="event-summary-card ${e.id === selectedId ? 'active' : ''}"
           onclick="selectEvent(${e.id})">
        <div style="display:flex;align-items:center;margin-bottom:6px;">
          <span class="card-dot"></span>
          <div class="card-type">${e.type}</div>
        </div>
        <div class="card-date">${e.date}</div>
        <div class="card-time">${e.time}</div>
      </div>
    `).join('');
  }
 
  function renderDetail() {
    const section = document.getElementById('eventDetailSection');
    const e = events.find(ev => ev.id === selectedId);
    if (!e) { section.innerHTML = ''; return; }
 
    section.innerHTML = `
      <div class="detail-grid">
        <div class="detail-card">
          <div class="detail-card-title">Event Information</div>
          <div class="info-table">
            <div class="info-label">Event</div>
            <div class="info-value">${e.type}</div>
            <div class="info-label">Name</div>
            <div class="info-value">${e.name}</div>
            <div class="info-label">Email</div>
            <div class="info-value">${e.email}</div>
            <div class="info-label">Guests</div>
            <div class="info-value">${e.guests}</div>
            <div class="info-label">Date</div>
            <div class="info-value">${e.date}</div>
            <div class="info-label">Time</div>
            <div class="info-value">${e.time}</div>
          </div>
        </div>
 
        <div class="detail-card">
          <div class="detail-card-title">Assigned Staff</div>
          <div class="staff-grid">
            ${e.staff.length ? e.staff.map(s => `
              <div class="staff-row">
                <div class="staff-avatar">${getInitials(s)}</div>
                <div class="staff-row-name">${s}</div>
              </div>
            `).join('') : '<div style="color:#888;font-family:Roboto,sans-serif;font-size:14px;">No staff assigned.</div>'}
          </div>
        </div>
 
        <div class="detail-card full-width">
          <div class="detail-card-title">Event Description</div>
          <div class="desc-text">${e.description || 'No description provided.'}</div>
        </div>
      </div>
    `;
  }
 
  renderSummaryRow();
  renderDetail();
  </script>
</body>
</html>
