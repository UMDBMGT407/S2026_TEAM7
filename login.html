<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./css/login.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  
  
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    a { text-decoration: none; }
  </style>
  <title>Document</title>
</head>
<body>
  <div class="login">
   <nav class="navbar navbar-expand-lg gt-nav">
      <div class="container">
        <a class="navbar-brand" href="./index.html">
          <img src="./images/logo.png" alt="Logo" class="nav-logo"/>
        </a>


        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>


        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto nav-links-row">
            <li class="nav-item">
              <a class="nav-link" href="./online_ordering.html">Order Online</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./event_inquiry.html">Event Inquiry</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./loyalty_status.html">Loyalty Status</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./become_a_member.html">Become a Member</a>
            </li>
          </ul>


          <ul class="navbar-nav auth-nav">
            <li class="nav-item account-actions">
              <a class="sign-in-btn active-signin" id="navAccountButton" href="./login.html">Sign In</a>
              <a class="sign-out-btn" id="navSignOutButton" href="#" hidden>Sign Out</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  
    <div class="page-content">
      <div class="admin-login">
        <div class="username">Username:</div>
        <input class="adminusername" id="username" type="text" name="username" />

        <div class="password">Password:</div>
        <input class="adminepassword" id="password" type="password" name="password" />

        <button class="loginbutton" id="loginButton" type="button">LOG IN</button>
      </div>
    </div>
  </div>
<script>
  const loginButton = document.getElementById("loginButton");

  loginButton.addEventListener("click", function () {
    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();

    if (username === "" || password === "") {
      alert("Please enter both a username and password.");
      return;
    }

    if (username.endsWith("@gtstaff.com")) {
      localStorage.setItem("userRole", "staff");
      localStorage.setItem("username", username);
      window.location.href = "./staff_scheduling.html";
    } else if (username.endsWith("@gtadmin.com")) {
      localStorage.setItem("userRole", "admin");
      localStorage.setItem("username", username);
      window.location.href = "./dashboard.html";
    } else {
      localStorage.setItem("userRole", "customer");
      localStorage.setItem("username", username);
      window.location.href = "./index.html";
    }
  });
</script>
</body>
</html>
